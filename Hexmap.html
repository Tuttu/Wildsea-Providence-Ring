<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div id="legend-container">
        <input type="text" id="legend-filter" placeholder="Filter locations...">

        <div class="legend-section">
            <h2 class="collapsible-header">Points of Interest</h2>
            <div class="collapsible-content">
                <ul class="hexmap-legend" id="poi-legend">
                    <li data-hex-id="Providence">Providence</li>
                    <li data-hex-id="Abundance">Abundance</li>
                    <li data-hex-id="Opulence">Opulence</li>
                    <li data-hex-id="Repentance">Repentance</li>
                    <li data-hex-id="Penitence">Penitence</li>
                </ul>
            </div>
        </div>

        <div class="legend-section">
            <h2 class="collapsible-header">Regions</h2>
            <div class="collapsible-content">
                <ul class="hexmap-legend" id="region-legend">
                    <li data-region-id="Abundance">Abundance Region</li>
                </ul>
            </div>
        </div>
    </div>
    <div id="hexmap1">
    </div>
    <script src="oi.hexmap.js"></script>
    <script src="map.js"></script>
</body>
</html>
